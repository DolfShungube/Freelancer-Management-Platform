
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Freelancio</title>
  <link rel="stylesheet" href="ClientPageStyle.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script type="module" src="../../../backend/config/pageProtection.js"></script>
  <script type="module" src="../../../backend/database/loadclient.js" defer></script>
  <script type="module" src="../../../backend/login/signout.js" defer></script>

</head>
<body>

  <form action="" class="form-header" style="display: flex; align-items: center; justify-content: space-between; padding: 1rem 1rem;">
    <h1 style="flex-grow: 1; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin: 1rem; margin-left: 200px;">
      Freelancio.
      <img src="images/coffee.png" alt="Freelancio Icon" style="width: 27px; margin-left: 8px;">
    </h1>
  
    <button type="button" class="chat-btn"
      onclick="window.location.href='freelancers.html'" aria-label="Open Chat"
      style="background-color: #fff; border: none; border-radius: 50%; padding: 0.5rem; cursor: pointer; margin-left: auto; margin-right: 1rem;">
      <img src="../../src/pages/images/bubble-chat.png" alt="Chat" style="width: 30px; height: 30px;">
    </button>
  
    <button id="search-icon" 
      style="background: none; border: none; cursor: pointer; margin-right: 1rem;">
      <img src="images/search.png" alt="Search Icon" style="width: 23px;">
    </button>
  
    <button id="menu-icon" 
      style="background: none; border: none; font-size: 24px; cursor: pointer;">
      ☰
    </button>
  </form>

<form class="form-profile">
    <img src="./images/profile_picture.jpg" alt="Profile Picture" class="profile-pic" />
    <section class="profile-text">
        <p id="userName" class="greeting">Hi, Name</p>
        <p class="role">Client</p>
      </section>
  </form>
  <section class="jobs">
    <h2>Jobs</h2>
  
    <!-- This section will be dynamically generated -->
    <ul id="joblist" class="job-list">
      <!-- One job -->
      <li id="myjobs">

      </li>
  
      <!-- More jobs will be added here -->
    </ul>
  </section>
  <button id="addJob" type="button" class="takejob-button">Add Job</button>
  
</body>
</html>
